# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:paf}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security Configuration
server.port=8081

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# File Upload Configuration
app.upload.dir=C:/Users/MSI/Desktop/PAF Assignmrnt/backend/uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.location=C:/Users/MSI/Desktop/PAF Assignmrnt/backend/uploads/temp
